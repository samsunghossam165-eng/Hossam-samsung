<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About - Tomas Atef</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
:root{
  --primary:#00b7ff;
  --primary-glow:rgba(0,183,255,0.4);
  --secondary:#7000ff;
  --bg:#050505;
  --card-bg:rgba(15,15,15,0.6);
  --border:rgba(255,255,255,0.08);
  --text:#e0e0e0;
  --text-dim:#888;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:#fff;
  font-family:'Cairo','Space Grotesk',sans-serif;
  overflow-x:hidden;
  min-height:100vh;
}

/* Animated Background */
.bg-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  opacity:0.35;
  z-index:0;
  pointer-events:none;
}
.orb-1{
  width:500px;height:500px;
  background:var(--primary);
  top:-10%;right:-10%;
  animation:float 8s ease-in-out infinite;
}
.orb-2{
  width:400px;height:400px;
  background:var(--secondary);
  bottom:-10%;left:-10%;
  animation:float 10s ease-in-out infinite reverse;
}
.orb-3{
  width:300px;height:300px;
  background:#ff0055;
  top:40%;left:30%;
  opacity:0.15;
  animation:float 12s ease-in-out infinite 2s;
}

@keyframes float{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(30px,-30px) scale(1.1);}
  66%{transform:translate(-20px,20px) scale(0.9);}
}

/* Noise Texture Overlay */
.noise{
  position:fixed;
  inset:0;
  z-index:1;
  opacity:0.03;
  pointer-events:none;
  background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}

/* Container */
.container{
  position:relative;
  z-index:2;
  max-width:1000px;
  margin:auto;
  padding:80px 24px;
  text-align:center;
}

/* Badge */
.badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:8px 20px;
  background:rgba(0,183,255,0.1);
  border:1px solid rgba(0,183,255,0.3);
  border-radius:50px;
  font-size:14px;
  font-weight:600;
  color:var(--primary);
  margin-bottom:24px;
  backdrop-filter:blur(10px);
}
.badge-dot{
  width:8px;height:8px;
  background:var(--primary);
  border-radius:50%;
  box-shadow:0 0 10px var(--primary);
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.5;transform:scale(0.8);}
}

/* Title */
h1{
  font-size:clamp(36px,6vw,64px);
  font-weight:900;
  line-height:1.1;
  margin-bottom:12px;
  background:linear-gradient(135deg,#fff 0%,var(--primary) 50%,var(--secondary) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
h1 span{
  display:block;
  font-size:0.5em;
  font-weight:400;
  color:var(--text-dim);
  -webkit-text-fill-color:var(--text-dim);
  margin-top:8px;
}

.subtitle{
  color:var(--text-dim);
  font-size:18px;
  max-width:500px;
  margin:0 auto 50px;
  line-height:1.7;
}

/* Profile Section - Enhanced */
.profile-wrap{
  position:relative;
  display:inline-block;
  margin-bottom:40px;
}

/* Outer Glow Ring */
.profile-glow{
  position:absolute;
  inset:-30px;
  border-radius:50%;
  background:conic-gradient(from 0deg, var(--primary), var(--secondary), #ff0055, var(--primary));
  opacity:0.3;
  filter:blur(15px);
  animation:spin-glow 8s linear infinite;
}
@keyframes spin-glow{
  to{transform:rotate(360deg);}
}

/* Inner Rotating Ring */
.profile-ring{
  position:absolute;
  inset:-12px;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--primary);
  border-right-color:var(--secondary);
  animation:spin 3s linear infinite;
}
.profile-ring-2{
  inset:-20px;
  border-top-color:var(--secondary);
  border-left-color:var(--primary);
  animation:spin 5s linear infinite reverse;
  opacity:0.6;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}

.profile{
  position:relative;
  z-index:2;
}

.profile img{
  width:200px;height:200px;
  border-radius:50%;
  object-fit:cover;
  border:4px solid rgba(0,183,255,0.4);
  box-shadow:
    0 0 40px rgba(0,183,255,0.4),
    0 0 80px rgba(0,183,255,0.15),
    0 0 120px rgba(0,183,255,0.05),
    inset 0 0 40px rgba(0,0,0,0.6);
  transition:all 0.5s cubic-bezier(0.4,0,0.2,1);
}
.profile img:hover{
  transform:scale(1.08);
  box-shadow:
    0 0 60px rgba(0,183,255,0.6),
    0 0 100px rgba(0,183,255,0.25),
    0 0 150px rgba(0,183,255,0.1),
    inset 0 0 40px rgba(0,0,0,0.6);
  border-color:var(--primary);
}

/* Main Card - Glassmorphism */
.card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:24px;
  padding:40px;
  backdrop-filter:blur(20px);
  position:relative;
  overflow:hidden;
}
.card::before{
  content:'';
  position:absolute;
  inset:0;
  border-radius:24px;
  padding:1px;
  background:linear-gradient(135deg,rgba(0,183,255,0.3),transparent 40%,transparent 60%,rgba(112,0,255,0.3));
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;
  mask-composite:exclude;
  pointer-events:none;
}

.intro-text{
  font-size:22px;
  line-height:2.2;
  color:var(--text);
  margin-bottom:30px;
}
.intro-text b{
  color:var(--primary);
  font-weight:800;
}

/* Social Grid */
.social{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-top:35px;
}

.social a{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
  padding:18px;
  border-radius:16px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
  color:#fff;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  overflow:hidden;
  transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
}
.social a::before{
  content:'';
  position:absolute;
  inset:0;
  opacity:0;
  transition:opacity 0.4s;
}
.social a:hover{
  transform:translateY(-5px);
  border-color:transparent;
  box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
.social a:hover::before{
  opacity:0.1;
}

/* Brand Colors with Glow */
.social a.fb{
  --brand:#1877F2;
  --brand-glow:rgba(24,119,242,0.4);
}
.social a.ig{
  --brand:#E1306C;
  --brand-glow:rgba(225,48,108,0.4);
}
.social a.tg{
  --brand:#2AABEE;
  --brand-glow:rgba(42,171,238,0.4);
}
.social a.wa{
  --brand:#25D366;
  --brand-glow:rgba(37,211,102,0.4);
}

.social a.fb::before{background:var(--brand);}
.social a.ig::before{background:var(--brand);}
.social a.tg::before{background:var(--brand);}
.social a.wa::before{background:var(--brand);}

.social a:hover{
  border-color:var(--brand);
  box-shadow:0 0 20px var(--brand-glow),0 10px 30px rgba(0,0,0,0.3);
}
.social a .icon{
  font-size:20px;
  transition:transform 0.3s;
}
.social a:hover .icon{
  transform:scale(1.2);
}

/* Scrollbar */
::-webkit-scrollbar{width:8px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--primary);border-radius:4px;}

/* Responsive */
@media(max-width:640px){
  .container{padding:50px 16px;}
  .card{padding:24px;}
  .profile img{width:160px;height:160px;}
}

/* Entrance Animations */
.reveal{
  opacity:0;
  transform:translateY(30px);
}
</style>
</head>

<script>
// GSAP Animations
gsap.utils.toArray('.reveal').forEach((el,i)=>{
  gsap.to(el,{
    opacity:1,
    y:0,
    duration:1,
    delay:i*0.15,
    ease:"power3.out"
  });
});

// Profile hover tilt effect
const profile=document.querySelector('.profile-wrap');
profile.addEventListener('mousemove',(e)=>{
  const rect=profile.getBoundingClientRect();
  const x=e.clientX-rect.left-rect.width/2;
  const y=e.clientY-rect.top-rect.height/2;
  gsap.to('.profile img',{
    rotationY:x/10,
    rotationX:-y/10,
    duration:0.5,
    ease:"power2.out"
  });
});
profile.addEventListener('mouseleave',()=>{
  gsap.to('.profile img',{
    rotationY:0,
    rotationX:0,
    duration:0.5
  });
});
</script>
